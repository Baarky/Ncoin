<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ユーザ名を登録</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1>ユーザ名を設定してください</h1>
  <input type="text" id="usernameInput" placeholder="ユーザ名">
  <button id="btn">登録</button>

  <script>
    document.getElementById("btn").addEventListener("click", async () => {
      const username = document.getElementById("usernameInput").value.trim();
      if (!username) {
        alert("ユーザ名を入力してください");
        return;
      }

      const res = await fetch("/set_username", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });
      const data = await res.json();
      if (data.success) {
        alert("登録されました");
        window.location.href = "/";  // または /dashboard
      } else {
        alert("エラー: " + (data.error || "登録失敗"));
      }
    });
  </script>
</body>
</html>
