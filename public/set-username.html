<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ユーザ名登録</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input { padding: 8px; margin: 8px; }
    button { padding: 8px 16px; }
  </style>
</head>
<body>
  <h1>ようこそ！</h1>
  <p>FriezaCoinを使うためにユーザ名を設定してください。</p>
  
  <input type="text" id="usernameInput" placeholder="ユーザ名を入力">
  <button id="setUsernameBtn">登録</button>

  <script>
    document.getElementById("setUsernameBtn").addEventListener("click", async () => {
      const username = document.getElementById("usernameInput").value.trim();
      if(!username) return alert("ユーザ名を入力してください");

      const res = await fetch("/set_username", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });

      const data = await res.json();
      if(data.success){
        alert("ユーザ名を登録しました！");
        window.location.href = "/dashboard";
      } else {
        alert("エラー: " + data.error);
      }
    });
  </script>
</body>
</html>
