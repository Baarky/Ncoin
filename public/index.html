<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>FriezaCoin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1>FriezaCoin</h1>
  <button id="loginBtn">Googleでログイン</button>

  <h2>ユーザ一覧</h2>
  <table id="userTable">
    <thead><tr><th>ID</th><th>ユーザ名</th><th>メール</th><th>残高</th></tr></thead>
    <tbody></tbody>
  </table>

  <h2>送金</h2>
  <form id="sendForm">
    <label>送金先ID: <input type="number" id="receiver_id" required></label><br>
    <label>金額: <input type="number" id="amount" required></label><br>
    <button type="submit">送金</button>
  </form>

  <script>
    document.getElementById("loginBtn").addEventListener("click", () => {
      window.location.href = "/auth/google";
    });

    async function loadUsers() {
      const res = await fetch("/users");
      if (!res.ok) {
        console.error("ユーザ取得失敗");
        return;
      }
      const users = await res.json();
      const tbody = document.querySelector("#userTable tbody");
      tbody.innerHTML = "";
      users.forEach(u => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${u.id}</td><td>${u.username}</td><td>${u.email}</td><td>${u.balance}</td>`;
        tbody.appendChild(tr);
      });
    }

    document.getElementById("sendForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const receiver_id = document.getElementById("receiver_id").value;
      const amount = document.getElementById("amount").value;

      const res = await fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ receiver_id, amount })
      });
      const data = await res.json();
      alert(data.message || data.error);
      loadUsers();
    });

    // 初期表示
    loadUsers();
  </script>
</body>
</html>
